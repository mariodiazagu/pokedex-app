<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PokéPlanner">
  <title>PokéPlanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --surface3: #22223a;
  --accent: #7c6af6;
  --accent2: #a89cf8;
  --accent-glow: rgba(124,106,246,.18);
  --red: #f06292;
  --green: #66bb6a;
  --blue: #42a5f5;
  --gold: #ffd54f;
  --text: #f0f0ff;
  --text2: #8888b0;
  --text3: #3a3a5a;
  --border: #1e1e30;
  --border2: #282840;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --r: 14px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100dvh; }

/* ── SVG ICONS ── */
.icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.icon svg { display: block; }

/* ── APP SHELL ── */
#app { display: flex; flex-direction: column; height: 100dvh; }

/* ── HEADER ── */
.header {
padding: calc(var(–safe-top) + 12px) 16px 12px;
display: flex; align-items: center; justify-content: space-between;
flex-shrink: 0; border-bottom: 1px solid var(–border);
background: var(–bg);
}
.header-brand { display: flex; align-items: center; gap: 10px; }
.brand-logo {
width: 32px; height: 32px; border-radius: 9px;
background: var(–accent); display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
}
.brand-name { font-size: 18px; font-weight: 700; letter-spacing: -.3px; color: var(–text); }
.brand-sub { font-size: 11px; color: var(–text2); font-weight: 500; margin-top: 0px; }
.header-right { display: flex; gap: 8px; align-items: center; }
.icon-btn {
width: 36px; height: 36px; border-radius: 10px;
border: 1px solid var(–border2); background: var(–surface);
display: flex; align-items: center; justify-content: center;
cursor: pointer; transition: background .15s, border-color .15s;
flex-shrink: 0;
}
.icon-btn:active { background: var(–surface3); }
.icon-btn.active { background: var(–accent); border-color: var(–accent); }
.icon-btn.active svg { color: #fff; }

/* ── PAGES ── */
.page { display: none; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
.page.active { display: flex; }

/* ── SEARCH ── */
.search-bar { padding: 10px 14px 8px; flex-shrink: 0; }
.search-inner {
display: flex; align-items: center; gap: 8px;
background: var(–surface); border: 1px solid var(–border2);
border-radius: 12px; padding: 10px 12px;
}
.search-inner svg { color: var(–text3); flex-shrink: 0; }
.search-input {
flex: 1; background: none; border: none; outline: none;
color: var(–text); font-size: 15px; font-family: var(–font); font-weight: 500;
}
.search-input::placeholder { color: var(–text3); }
.search-clear { color: var(–text3); cursor: pointer; padding: 2px; display: none; transition: color .15s; }
.search-clear:active { color: var(–text2); }
.search-clear.show { display: flex; }

/* ── FILTER ROWS ── */
.filter-row {
overflow-x: auto; padding: 0 14px 6px;
flex-shrink: 0; scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-inner { display: flex; gap: 6px; white-space: nowrap; }
.pill {
display: inline-flex; align-items: center; gap: 5px;
padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
border: 1px solid var(–border2); background: var(–surface); color: var(–text2);
cursor: pointer; white-space: nowrap; font-family: var(–font);
transition: all .15s;
}
.pill.active { background: var(–accent); border-color: var(–accent); color: #fff; }
.pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── RESULT COUNT ── */
.result-count { padding: 0 14px 5px; font-size: 11px; color: var(–text3); font-weight: 600; flex-shrink: 0; }

/* ── GRID ── */
.grid-scroll {
flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
padding: 0 10px; padding-bottom: calc(8px + var(–safe-bottom));
overscroll-behavior: contain;
}
.poke-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

/* ── CARD ── */
.poke-card {
background: var(–surface); border: 1px solid var(–border2);
border-radius: var(–r); padding: 9px 7px 9px; cursor: pointer;
display: flex; flex-direction: column; align-items: center;
transition: transform .12s; position: relative; overflow: hidden;
min-height: 126px;
}
.poke-card:active { transform: scale(.93); }
.card-header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 2px; }
.card-id { font-size: 9px; color: var(–text3); font-weight: 600; }
.card-rar-dot { width: 6px; height: 6px; border-radius: 50%; }
.card-img { width: 62px; height: 62px; object-fit: contain; }
.card-img.px { width: 54px; height: 54px; image-rendering: pixelated; margin: 4px 0; }
.card-name { font-size: 10px; font-weight: 600; text-align: center; margin: 4px 0 3px; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(–text); }
.card-types { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; }
.type-badge { padding: 2px 5px; border-radius: 5px; font-size: 8px; font-weight: 700; color: #fff; }
.card-status { position: absolute; bottom: 6px; right: 6px; display: flex; gap: 2px; align-items: center; }
.card-overlays { position: absolute; top: 6px; right: 6px; display: flex; gap: 2px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; }

/* ── TAB BAR ── */
.tab-bar {
display: flex; border-top: 1px solid var(–border); background: var(–surface);
flex-shrink: 0; padding-bottom: var(–safe-bottom);
}
.tab {
flex: 1; display: flex; flex-direction: column; align-items: center;
justify-content: center; padding: 9px 4px 7px; cursor: pointer;
gap: 4px; border: none; background: none; font-family: var(–font);
transition: opacity .15s;
}
.tab svg { color: var(–text3); transition: color .15s; }
.tab-label { font-size: 9px; font-weight: 600; color: var(–text3); text-transform: uppercase; letter-spacing: .4px; transition: color .15s; }
.tab.active svg { color: var(–accent); }
.tab.active .tab-label { color: var(–accent); }

/* ── MODAL ── */
#overlay {
position: fixed; inset: 0; background: rgba(0,0,0,.7);
backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
z-index: 900; display: none; align-items: flex-end;
}
#overlay.open { display: flex; }
#modal {
background: var(–bg); width: 100%; max-height: 93dvh;
border-radius: 24px 24px 0 0; display: flex; flex-direction: column;
animation: slideUp .28s cubic-bezier(.4,1.3,.6,1);
padding-bottom: var(–safe-bottom);
border: 1px solid var(–border2); border-bottom: none;
}
@keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }
.modal-pull { width: 36px; height: 4px; background: var(–border2); border-radius: 2px; margin: 10px auto; }
.modal-header {
display: flex; align-items: center; justify-content: space-between;
padding: 4px 14px 12px; border-bottom: 1px solid var(–border); flex-shrink: 0;
}
.modal-id { font-size: 13px; color: var(–text2); font-weight: 600; }
.modal-hdr-btns { display: flex; gap: 6px; }
.modal-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }

/* ── MODAL HERO ── */
.hero {
margin: 12px 14px; border-radius: 18px; padding: 18px 16px 14px;
display: flex; flex-direction: column; align-items: center; position: relative;
}
.hero-shiny-btn {
position: absolute; top: 12px; right: 12px;
width: 34px; height: 34px; border-radius: 9px;
border: 1px solid rgba(255,255,255,.1); background: rgba(0,0,0,.25);
display: flex; align-items: center; justify-content: center;
cursor: pointer; transition: all .2s;
}
.hero-shiny-btn svg { color: var(–text3); }
.hero-shiny-btn.on { background: rgba(255,213,79,.15); border-color: var(–gold); }
.hero-shiny-btn.on svg { color: var(–gold); }
.hero-img-wrap { width: 130px; height: 130px; position: relative; flex-shrink: 0; }
.hero-img { width: 130px; height: 130px; object-fit: contain; position: absolute; top: 0; left: 0; }
.hero-img.px { image-rendering: pixelated; width: 110px; height: 110px; top: 10px; left: 10px; }
.hero-img.shiny { filter: drop-shadow(0 0 14px rgba(255,213,79,.7)); }
.hero-name { font-size: 24px; font-weight: 700; margin-top: 10px; text-transform: capitalize; letter-spacing: -.2px; }
.hero-form-label { font-size: 12px; color: var(–text2); font-weight: 500; margin-top: 2px; text-transform: capitalize; }
.hero-rar {
display: inline-flex; align-items: center; gap: 6px;
padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
margin: 8px 0; border: 1px solid;
}
.hero-rar-dot { width: 7px; height: 7px; border-radius: 50%; }
.hero-types { display: flex; gap: 7px; margin-bottom: 14px; }
.hero-type-pill { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; color: #fff; }
.hero-stats { display: flex; gap: 20px; align-items: center; }
.hstat { text-align: center; }
.hstat-val { font-size: 17px; font-weight: 700; }
.hstat-lbl { font-size: 10px; color: var(–text2); font-weight: 500; margin-top: 1px; }
.hstat-div { width: 1px; height: 28px; background: var(–border2); }

/* ── QUICK ACTIONS ── */
.quick-btns { display: flex; gap: 8px; padding: 0 14px 10px; }
.qbtn {
flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
padding: 10px; border-radius: 11px; border: 1px solid var(–border2);
background: var(–surface); cursor: pointer; font-size: 12px; font-weight: 600;
color: var(–text2); font-family: var(–font); transition: all .15s;
}
.qbtn svg { flex-shrink: 0; }
.qbtn.fav { background: rgba(240,98,146,.1); border-color: var(–red); color: var(–red); }
.qbtn.fav svg { color: var(–red); }
.qbtn.team { background: rgba(66,165,245,.1); border-color: var(–blue); color: var(–blue); }
.qbtn.team svg { color: var(–blue); }

/* ── FORMS ── */
.forms-section { margin: 0 14px 10px; }
.section-label { font-size: 10px; font-weight: 700; color: var(–text2); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 7px; }
.forms-scroll { overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.forms-scroll::-webkit-scrollbar { display: none; }
.forms-inner { display: flex; gap: 7px; padding-bottom: 2px; }
.form-chip {
display: flex; flex-direction: column; align-items: center; gap: 4px;
padding: 7px 10px; background: var(–surface); border-radius: 11px;
border: 1px solid var(–border2); cursor: pointer; flex-shrink: 0;
min-width: 66px; max-width: 80px; transition: all .15s;
}
.form-chip.active { border-color: var(–accent); background: var(–accent-glow); }
.form-chip img { width: 46px; height: 46px; object-fit: contain; }
.form-chip img.px { image-rendering: pixelated; width: 38px; height: 38px; }
.form-chip-name { font-size: 9px; font-weight: 600; color: var(–text2); text-align: center; text-transform: capitalize; max-width: 76px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.form-chip.active .form-chip-name { color: var(–accent2); }

/* ── LEGEND ── */
.modal-legend {
margin: 0 14px 10px; padding: 9px 12px;
background: var(–surface); border-radius: 11px;
font-size: 11px; color: var(–text2); text-align: center; font-weight: 500;
line-height: 1.8; border: 1px solid var(–border);
}

/* ── GEN SECTIONS ── */
.gen-section { margin: 0 14px 8px; background: var(–surface); border-radius: 12px; border: 1px solid var(–border2); overflow: hidden; }
.gen-header { display: flex; align-items: center; justify-content: space-between; padding: 11px 13px; cursor: pointer; user-select: none; }
.gen-header-left { display: flex; align-items: center; gap: 7px; }
.gen-chevron { transition: transform .2s; color: var(–text3); }
.gen-chevron.open { transform: rotate(90deg); }
.gen-title { font-size: 13px; font-weight: 600; }
.gen-badge { background: rgba(102,187,106,.1); color: var(–green); font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 8px; border: 1px solid rgba(102,187,106,.25); }
.gen-games { padding: 0 10px 10px; display: none; flex-direction: column; gap: 5px; }
.gen-games.open { display: flex; }

/* ── GAME ROWS ── */
.game-row { background: var(–bg); border-radius: 10px; padding: 9px 10px; border: 1px solid var(–border); }
.game-row.has-data { border-color: rgba(102,187,106,.3); background: rgba(102,187,106,.04); }
.game-row-top { display: flex; align-items: center; gap: 7px; }
.game-color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.game-row-name { flex: 1; font-size: 12px; font-weight: 600; color: var(–text); }
.game-actions { display: flex; gap: 4px; }
.act-btn {
width: 31px; height: 31px; border-radius: 8px; background: var(–surface2);
border: 1px solid var(–border); display: flex; align-items: center;
justify-content: center; cursor: pointer; transition: all .15s; opacity: .35;
}
.act-btn svg { color: var(–text2); }
.act-btn.on { opacity: 1; }
.act-btn.cap.on { background: rgba(102,187,106,.12); border-color: rgba(102,187,106,.4); }
.act-btn.cap.on svg { color: var(–green); }
.act-btn.shy.on { background: rgba(255,213,79,.1); border-color: rgba(255,213,79,.4); }
.act-btn.shy.on svg { color: var(–gold); }
.act-btn.box.on { background: rgba(66,165,245,.1); border-color: rgba(66,165,245,.3); }
.act-btn.box.on svg { color: var(–blue); }
.act-btn.ball.on { opacity: 1; background: var(–accent-glow); border-color: var(–accent); }
.act-btn.ball.on svg { color: var(–accent); }
.act-btn.note.on { background: rgba(168,156,248,.1); border-color: rgba(168,156,248,.3); opacity: 1; }
.act-btn.note.on svg { color: var(–accent2); }

/* ── BALL SELECTOR ── */
.ball-section { margin-top: 7px; display: none; }
.ball-section.open { display: block; }
.ball-section-label { font-size: 10px; color: var(–text2); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .4px; }
.ball-grid { display: flex; flex-wrap: wrap; gap: 4px; }
.ball-chip {
display: flex; flex-direction: column; align-items: center; gap: 2px;
padding: 5px 6px; border-radius: 9px; background: var(–surface2);
border: 1px solid transparent; cursor: pointer; min-width: 44px; transition: all .15s;
}
.ball-chip.selected { border-color: var(–gold); background: rgba(255,213,79,.08); }
.ball-chip-icon { font-size: 16px; line-height: 1.2; }
.ball-chip-name { font-size: 8px; color: var(–text2); font-weight: 600; text-align: center; }

/* ── NOTES ── */
.notes-area { margin-top: 7px; display: none; }
.notes-area.open { display: block; }
.notes-ta {
width: 100%; background: var(–surface2); border: 1px solid var(–border2);
border-radius: 9px; padding: 9px; color: var(–text); font-size: 14px;
font-family: var(–font); font-weight: 400; min-height: 56px; resize: none; outline: none;
}
.notes-ta:focus { border-color: var(–accent); }
.notes-ta::placeholder { color: var(–text3); }
.modal-spacer { height: 28px; }

/* ── FAV / TEAM ── */
.page-header { padding: 12px 14px 8px; flex-shrink: 0; }
.page-title { font-size: 20px; font-weight: 700; letter-spacing: -.2px; }
.page-subtitle { font-size: 11px; color: var(–text2); font-weight: 500; margin-top: 2px; }
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 40px; text-align: center; }
.empty-icon svg { color: var(–text3); }
.empty-title { font-size: 16px; font-weight: 600; color: var(–text2); margin-top: 4px; }
.empty-sub { font-size: 13px; color: var(–text3); font-weight: 500; }

/* ── TEAM SLOTS ── */
.team-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; padding: 0 14px 10px; flex-shrink: 0; }
.team-slot {
background: var(–surface); border: 1px solid var(–border2); border-radius: 12px;
display: flex; flex-direction: column; align-items: center; justify-content: center;
padding: 9px 5px; min-height: 90px; cursor: pointer; position: relative; transition: all .15s;
}
.team-slot.filled { border-color: rgba(66,165,245,.4); background: rgba(66,165,245,.05); }
.team-slot.empty { border-style: dashed; opacity: .4; }
.team-slot:active { transform: scale(.95); }
.team-slot img { width: 50px; height: 50px; object-fit: contain; }
.team-slot-name { font-size: 9px; font-weight: 600; text-align: center; margin-top: 4px; text-transform: capitalize; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; padding: 0 4px; }
.team-slot-num { font-size: 20px; font-weight: 700; color: var(–text3); }
.team-slot-rm { position: absolute; top: 4px; right: 4px; width: 18px; height: 18px; border-radius: 50%; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; cursor: pointer; }
.team-slot-rm svg { color: var(–text2); }

/* ── STATS ── */
.stats-header { padding: 12px 14px 8px; flex-shrink: 0; display: flex; align-items: center; gap: 10px; }
.stats-title { font-size: 20px; font-weight: 700; letter-spacing: -.2px; flex-shrink: 0; }
.stats-game-select {
flex: 1; background: var(–surface); border: 1px solid var(–border2);
border-radius: 10px; padding: 8px 10px; color: var(–text);
font-size: 13px; font-family: var(–font); font-weight: 500; outline: none;
-webkit-appearance: none; appearance: none;
}
.stats-scroll { flex: 1; overflow-y: auto; padding: 0 14px; padding-bottom: calc(14px + var(–safe-bottom)); overscroll-behavior: contain; }
.stats-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(–text2); margin-bottom: 8px; padding-top: 14px; }
.big-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 7px; }
.big-card { background: var(–surface); border: 1px solid var(–border2); border-radius: 12px; padding: 12px; text-align: center; }
.big-val { font-size: 28px; font-weight: 700; line-height: 1; }
.big-lbl { font-size: 10px; color: var(–text2); font-weight: 500; margin-top: 4px; }
.bar-card { background: var(–surface); border: 1px solid var(–border2); border-radius: 12px; padding: 12px; }
.bar-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.bar-row:last-child { margin-bottom: 0; }
.bar-lbl { font-size: 10px; font-weight: 600; width: 70px; flex-shrink: 0; color: var(–text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; height: 14px; background: var(–surface3); border-radius: 7px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 7px; transition: width .5s ease; min-width: 3px; }
.bar-num { font-size: 10px; font-weight: 700; width: 26px; text-align: right; flex-shrink: 0; }
.poke-list { display: flex; flex-direction: column; gap: 5px; }
.poke-list-row {
display: flex; align-items: center; gap: 8px;
background: var(–surface); border: 1px solid var(–border); border-radius: 10px;
padding: 7px 10px; cursor: pointer; transition: all .12s;
}
.poke-list-row:active { transform: scale(.97); }
.poke-list-row img { width: 38px; height: 38px; object-fit: contain; }
.poke-list-info { flex: 1; min-width: 0; }
.poke-list-name { font-size: 12px; font-weight: 600; text-transform: capitalize; }
.poke-list-sub { font-size: 10px; color: var(–text3); font-weight: 500; }
.poke-list-badge { font-size: 12px; font-weight: 700; flex-shrink: 0; }
</style>

</head>
<body>
<div id="app">
  <!-- HEADER -->
  <header class="header">
    <div class="header-brand">
      <div class="brand-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="white" stroke-width="2"/>
          <line x1="2" y1="12" x2="22" y2="12" stroke="white" stroke-width="2"/>
          <circle cx="12" cy="12" r="3" fill="white"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">PokéPlanner</div>
        <div class="brand-sub" id="app-stats">0 / 1025 capturados</div>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="sprite-btn" onclick="toggleSprite()" title="Cambiar sprite">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
    </div>
  </header>

  <!-- DEX PAGE -->

  <div class="page active" id="page-dex">

// ── CDN: jsDelivr works on GitHub Pages, raw.githubusercontent doesn't ──
const CDN = 'https://cdn.jsdelivr.net/gh/PokeAPI/sprites@master/sprites/pokemon';
const imgArt   = id => `${CDN}/other/official-artwork/${id}.png`;
const imgShiny = id => `${CDN}/other/official-artwork/shiny/${id}.png`;
const imgPx    = id => `${CDN}/${id}.png`;
const imgPxShy = id => `${CDN}/shiny/${id}.png`;
const spriteOf = (id, modern, shiny) =>
  modern ? (shiny ? imgShiny(id) : imgArt(id)) : (shiny ? imgPxShy(id) : imgPx(id));
const formSprite = (f, modern, shiny) => {
  if (!f) return '';
  if (modern) return shiny ? (f.sprites?.official_shiny || imgShiny(f.id)) : (f.sprites?.official || imgArt(f.id));
  return shiny ? (f.sprites?.front_shiny || imgPxShy(f.id)) : (f.sprites?.front_default || imgPx(f.id));
};

// ── FORMS (lazy from API, sprites adjusted to jsDelivr) ──
async function fetchForms(baseId) {
  if (S.formsCache[baseId]) return S.formsCache[baseId];
  const base = S.poke.find(p => p.id === baseId);
  const fallback = [{
    id: baseId, name: base?.name || '', speciesName: base?.name || '',
    types: base?.types || [], isDefault: true,
    sprites: { official: imgArt(baseId), official_shiny: imgShiny(baseId), front_default: imgPx(baseId), front_shiny: imgPxShy(baseId) }
  }];
  try {
    const r = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${baseId}`);
    if (!r.ok) throw 0;
    const spec = await r.json();
    if (!spec.varieties || spec.varieties.length <= 1) {
      S.formsCache[baseId] = fallback; LS.saveForms(); return fallback;
    }
    const fs = await Promise.allSettled(spec.varieties.map(v =>
      fetch(v.pokemon.url).then(r => r.json()).then(d => ({
        id: d.id, name: d.name, speciesName: spec.name,
        types: d.types.map(t => t.type.name), isDefault: v.is_default,
        sprites: {
          official: d.sprites?.other?.['official-artwork']?.front_default || null,
          official_shiny: d.sprites?.other?.['official-artwork']?.front_shiny || null,
          front_default: d.sprites?.front_default || null,
          front_shiny: d.sprites?.front_shiny || null,
        }
      }))
    ));
    const valid = fs.filter(f => f.status === 'fulfilled').map(f => f.value)
      .sort((a, b) => a.isDefault ? -1 : b.isDefault ? 1 : a.id - b.id);
    S.formsCache[baseId] = valid.length ? valid : fallback;
    LS.saveForms();
    return S.formsCache[baseId];
  } catch {
    S.formsCache[baseId] = fallback;
    return fallback;
  }
}

// ── GRID ──
function getFiltered() {
  const { q, type, gen, rarity } = S.filters;
  return S.poke.filter(p => {
    if (q) { const lq = q.toLowerCase(); if (!p.name.includes(lq) && !String(p.id).startsWith(q)) return false; }
    if (type && !p.types.includes(type)) return false;
    if (gen && p.generation !== gen) return false;
    if (rarity && p.rarity !== rarity) return false;
    return true;
  });
}
function renderGrid() {

// ── STATS ──
function drawStats() {
  if (S.tab !== 'stats') return;
  const gid = document.getElementById('stats-game').value;
  const total = S.poke.length;
  const capIds = new Set(), shyIds = new Set(), neverCap = [], alwaysCap = [];
  const typeC = {}; TYPES.forEach(t => { typeC[t.id] = 0; });
  const rarC = {}; Object.keys(RARITY).forEach(k => { rarC[k] = 0; });
  const ballC = {}; BALLS.forEach(b => { ballC[b.id] = 0; });
  S.poke.forEach(p => {
    const t = S.tracking[p.id];
    if (gid === 'all') {
      const any = t && Object.values(t).some(g => g.captured);
      if (any) { capIds.add(p.id); p.types.forEach(tp => { if (tp in typeC) typeC[tp]++; }); rarC[p.rarity] = (rarC[p.rarity]||0)+1; }
      if (!any) neverCap.push(p);
      if (t && GAMES.every(g => t[g.id]?.captured)) alwaysCap.push(p);
      if (t && Object.values(t).some(g => g.shiny)) shyIds.add(p.id);
      if (t) Object.values(t).forEach(g => { if (g?.ball && g.ball in ballC) ballC[g.ball]++; });
    } else {
      const c = !!(t && t[gid]?.captured);
      if (c) { capIds.add(p.id); p.types.forEach(tp => { if (tp in typeC) typeC[tp]++; }); rarC[p.rarity] = (rarC[p.rarity]||0)+1; }
      if (!c) neverCap.push(p);
      if (t && t[gid]?.shiny) shyIds.add(p.id);
      if (t && t[gid]?.ball && t[gid].ball in ballC) ballC[t[gid].ball]++;
    }
  });
  const pct = total ? Math.round((capIds.size / total) * 100) : 0;
  const tSorted = TYPES.map(t => ({...t, c: typeC[t.id]})).sort((a,b) => b.c - a.c);
  const maxT = Math.max(1, ...tSorted.map(t => t.c));
  const topBalls = BALLS.filter(b => ballC[b.id] > 0).sort((a,b) => ballC[b.id] - ballC[a.id]).reverse().slice(0,10);
  const maxBall = topBalls.length ? ballC[topBalls[0].id] : 1;
  const perGame = gid === 'all' ? GAMES.map(g => ({...g, count: Object.values(S.tracking).filter(t => t[g.id]?.captured).length})).sort((a,b) => b.count - a.count).slice(0,12) : [];
  const maxGame = perGame.length ? perGame[0].count : 1;
  const gName = gid === 'all' ? 'global' : (GAMES.find(g => g.id === gid)?.name || gid);
  const el = document.getElementById('stats-body');
  el.innerHTML = `
    <div class="stats-section-title">Resumen ${gName}</div>
    <div class="big-grid">
      <div class="big-card"><div class="big-val" style="color:var(--green)">${capIds.size}</div><div class="big-lbl">Capturados</div></div>
      <div class="big-card"><div class="big-val" style="color:var(--gold)">${shyIds.size}</div><div class="big-lbl">Shiny</div></div>
      <div class="big-card"><div class="big-val" style="color:var(--accent)">${pct}%</div><div class="big-lbl">Completado</div></div>
      <div class="big-card"><div class="big-val" style="color:var(--text2)">${neverCap.length}</div><div class="big-lbl">Sin capturar</div></div>
    </div>
    <div class="stats-section-title">Por tipo</div>
    <div class="bar-card">${tSorted.map(t=>`<div class="bar-row"><div class="bar-lbl">${t.name}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round((t.c/maxT)*100)}%;background:${t.c}"></div></div><div class="bar-num">${t.c}</div></div>`).join('')}</div>
    <div class="stats-section-title">Por rareza</div>
    <div class="bar-card">${Object.entries(RARITY).map(([k,r])=>{const tot=S.poke.filter(p=>p.rarity===k).length;const got=rarC[k]||0;return`<div class="bar-row"><div class="bar-lbl"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${r.dot};margin-right:4px;vertical-align:middle"></span>${r.l}</div><div class="bar-track"><div class="bar-fill" style="width:${tot?Math.round((got/tot)*100):0}%;background:${r.dot}"></div></div><div class="bar-num">${got}/${tot}</div></div>`;}).join('')}</div>
    ${perGame.length?`<div class="stats-section-title">Top juegos</div><div class="bar-card">${perGame.map(g=>`<div class="bar-row"><div class="bar-lbl">${g.name}</div><div class="bar-track"><div class="bar-fill" style="width:${maxGame?Math.round((g.count/maxGame)*100):0}%;background:${g.c}"></div></div><div class="bar-num">${g.count}</div></div>`).join('')}</div>`:''}
    ${topBalls.length?`<div class="stats-section-title">Pokéballs usadas</div><div class="bar-card">${topBalls.map(b=>`<div class="bar-row"><div class="bar-lbl">${b.e} ${b.n}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round((ballC[b.id]/maxBall)*100)}%;background:var(--accent)"></div></div><div class="bar-num">${ballC[b.id]}</div></div>`).join('')}</div>`:''}
    ${neverCap.length?`<div class="stats-section-title">Nunca capturado (${Math.min(30,neverCap.length)} de ${neverCap.length})</div><div class="poke-list">${neverCap.slice(0,30).map(p=>`<div class="poke-list-row" onclick="openModal(${p.id})"><img src="${spriteOf(p.id,S.settings.modern,false)}" onerror="this.style.opacity='.1'"><div class="poke-list-info"><div class="poke-list-name">${cap(p.name)}</div><div class="poke-list-sub">#${pad(p.id)} · ${RARITY[p.rarity].l}</div></div><div class="poke-list-badge" style="color:var(--red)">–</div></div>`).join('')}</div>`:''}
    ${alwaysCap.length?`<div class="stats-section-title">Capturado en todos los juegos (${alwaysCap.length})</div><div class="poke-list">${alwaysCap.slice(0,30).map(p=>`<div class="poke-list-row" onclick="openModal(${p.id})"><img src="${spriteOf(p.id,S.settings.modern,false)}" onerror="this.style.opacity='.1'"><div class="poke-list-info"><div class="poke-list-name">${cap(p.name)}</div><div class="poke-list-sub">#${pad(p.id)}</div></div><div class="poke-list-badge" style="color:var(--green)">✦</div></div>`).join('')}</div>`:''}
    <div style="height:20px"></div>`;
}

// ── MODAL ──
async function openModal(id) {
  S.mId = id; S.mFormIdx = 0; S.mModern = S.settings.modern; S.mShiny = false; S.mForms = [];
  const base = S.poke.find(p => p.id === id); if (!base) return;
  buildModal(base, []);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  const forms = await fetchForms(id);
  if (S.mId === id) { S.mForms = forms; buildModal(base, forms); }
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); document.body.style.overflow = ''; }
function overlayClick(e) { if (e.target.id === 'overlay') closeModal(); }

function buildModal(base, forms) {
  const id = base.id;
  const rar = RARITY[base.rarity] || RARITY.normal;
  const fav = isFav(id), team = inTeam(id);
  const typeClr = base.types[0] ? tc(base.types[0]) : '#6060a0';
  const caughtC = GAMES.filter(g => S.tracking?.[id]?.[g.id]?.captured).length;
  const curForm = forms[S.mFormIdx] || null;
  const imgSrc = curForm ? formSprite(curForm, S.mModern, S.mShiny) : spriteOf(id, S.mModern, S.mShiny);
  const formLabel = curForm && S.mFormIdx > 0 ? fmtForm(curForm.name, curForm.speciesName) : null;
  document.getElementById('modal-num').textContent = `#${pad(id)}`;
  document.getElementById('modal-sprite-btn').classList.toggle('active', !S.mModern);
  const typePills = base.types.map(t => { const ti = TYPES.find(x => x.id === t); return `<span class="hero-type-pill" style="background:${tc(t)}">${ti?.name||t}</span>`; }).join('');
  const formsHTML = forms.length > 1 ? `<div class="forms-section">
    <div class="section-label">Formas (${forms.length})</div>
    <div class="forms-scroll"><div class="forms-inner">${forms.map((f,i)=>{
      const sp = S.mModern ? (f.sprites.official || imgArt(f.id)) : (f.sprites.front_default || imgPx(f.id));
      return `<div class="form-chip${i===S.mFormIdx?' active':''}" onclick="selectForm(${i})">
        <img src="${sp}" class="${S.mModern?'':'px'}" onerror="this.style.opacity='.1'">
        <div class="form-chip-name">${fmtForm(f.name,f.speciesName)}</div>
      </div>`;
    }).join('')}</div></div>
  </div>` : '';
  const gens = [1,2,3,4,5,6,7,8,9].map(gen => {
    const gGs = GAMES.filter(g => g.gen === gen);
    const active = gGs.some(g => { const d = S.tracking?.[id]?.[g.id]; return d && (d.captured||d.shiny||d.inBox||d.notes||d.ball); });
    return `<div class="gen-section">
      <div class="gen-header" onclick="tGen(${gen})">
        <div class="gen-header-left">
          <svg class="gen-chevron" id="ga-${gen}" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          <span class="gen-title">${GNAMES_LONG[gen]}</span>
        </div>
        ${active ? '<span class="gen-badge">✦ activo</span>' : ''}
      </div>
      <div class="gen-games" id="gg-${gen}">${gGs.map(g => gameRowHTML(id, g)).join('')}</div>
    </div>`;
  }).join('');
  document.getElementById('modal-body').innerHTML = `
    <div class="hero" id="mhero" style="background:${S.mShiny?'rgba(255,213,79,.1)':typeClr+'15'}">
      <button class="hero-shiny-btn${S.mShiny?' on':''}" onclick="toggleShiny()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="${S.mShiny?'var(--gold)':'none'}" stroke="${S.mShiny?'var(--gold)':'currentColor'}" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </button>
      <div class="hero-img-wrap">
        <img id="mimg" class="hero-img${S.mModern?'':' px'}${S.mShiny?' shiny':''}" src="${imgSrc}" alt="${base.name}" onerror="this.style.opacity='.2'">
      </div>
      <div class="hero-name">${cap(base.name)}</div>
      ${formLabel ? `<div class="hero-form-label">${formLabel}</div>` : ''}
      <div class="hero-rar" style="background:${rar.dot}18;border-color:${rar.dot}60;color:${rar.dot}">
        <span class="hero-rar-dot" style="background:${rar.dot}"></span>${rar.l}
      </div>
      <div class="hero-types">${typePills}</div>
      <div class="hero-stats">
        <div class="hstat"><div class="hstat-val">${caughtC}/${GAMES.length}</div><div class="hstat-lbl">Juegos</div></div>
        <div class="hstat-div"></div>
        <div class="hstat"><div class="hstat-val">Gen ${base.generation}</div><div class="hstat-lbl">Generación</div></div>
        <div class="hstat-div"></div>
        <div class="hstat"><div class="hstat-val">#${pad(id)}</div><div class="hstat-lbl">Número</div></div>
      </div>
    </div>
    <div class="quick-btns">
      <button class="qbtn${fav?' fav':''}" id="qfav" onclick="doFav(${id})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="${fav?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        ${fav ? 'Favorito' : 'Añadir favorito'}
      </button>
      <button class="qbtn${team?' team':''}" id="qteam" onclick="doTeam(${id})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="${team?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        ${team ? 'En equipo' : 'Al equipo'}
      </button>
    </div>
    ${formsHTML}
    <div class="modal-legend">
      <span style="color:var(--green)">✦</span> Capturado &nbsp;
      <span style="color:var(--gold)">★</span> Shiny &nbsp;
      <span style="color:var(--blue)">▣</span> En caja &nbsp;
      <span style="color:var(--accent2)">◎</span> Poké Ball &nbsp;
      <span style="color:var(--text2)">✎</span> Notas
    </div>
    ${gens}
    <div class="modal-spacer"></div>`;
}

function selectForm(i) { S.mFormIdx = i; const b = S.poke.find(p => p.id === S.mId); if (b) buildModal(b, S.mForms); }
function toggleModalSprite() { S.mModern = !S.mModern; const b = S.poke.find(p => p.id === S.mId); if (b) buildModal(b, S.mForms); }
function toggleShiny() { S.mShiny = !S.mShiny; const b = S.poke.find(p => p.id === S.mId); if (b) buildModal(b, S.mForms); }
function doFav(id) { toggleFav(id); const f = isFav(id); const btn = document.getElementById('qfav'); if (btn) { btn.className = `qbtn${f?' fav':''}`; btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="${f?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>${f?'Favorito':'Añadir favorito'}`; } }
function doTeam(id) { toggleTeam(id); const t = inTeam(id); const btn = document.getElementById('qteam'); if (btn) { btn.className = `qbtn${t?' team':''}`; btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="${t?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>${t?'En equipo':'Al equipo'}`; } }
function tGen(gen) { const gg = document.getElementById(`gg-${gen}`); const ga = document.getElementById(`ga-${gen}`); const open = gg.classList.toggle('open'); if (ga) ga.classList.toggle('open', open); }
function tNotes(key) { document.getElementById(`nw-${key}`)?.classList.toggle('open'); }
function tBalls(key) { document.getElementById(`bs-${key}`)?.classList.toggle('open'); }

function gameRowHTML(pid, game) {
  const d = { ...tDef(), ...(S.tracking?.[pid]?.[game.id] || {}) };
  const hasData = d.captured || d.shiny || d.inBox || d.notes || d.ball;
  const bObj = d.ball ? BALLS.find(b => b.id === d.ball) : null;
  return `<div class="game-row${hasData?' has-data':''}" id="gr-${pid}-${game.id}">
    <div class="game-row-top">
      <div class="game-color-dot" style="background:${game.c}"></div>
      <span class="game-row-name">${game.name}</span>
      <div class="game-actions">
        <button class="act-btn cap${d.captured?' on':''}" onclick="doTrack(${pid},'${game.id}','captured')" title="Capturado">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <button class="act-btn shy${d.shiny?' on':''}" onclick="doTrack(${pid},'${game.id}','shiny')" title="Shiny">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="${d.shiny?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
        <button class="act-btn box${d.inBox?' on':''}" onclick="doTrack(${pid},'${game.id}','inBox')" title="En caja">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        </button>
        <button class="act-btn ball${d.ball?' on':''}" onclick="tBalls('${pid}-${game.id}')" title="Poké Ball" style="${d.ball?'opacity:1':''}">
          ${bObj ? `<span style="font-size:12px;line-height:1">${bObj.e}</span>` : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>`}
        </button>
        <button class="act-btn note${d.notes?' on':''}" onclick="tNotes('${pid}-${game.id}')" title="Nota">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
    </div>
    <div class="ball-section" id="bs-${pid}-${game.id}">
      <div class="ball-section-label">Elegir Poké Ball</div>
      <div class="ball-grid">${BALLS.map(b=>`<div class="ball-chip${d.ball===b.id?' selected':''}" onclick="doBall(${pid},'${game.id}','${b.id}')"><div class="ball-chip-icon">${b.e}</div><div class="ball-chip-name">${b.n}</div></div>`).join('')}</div>
    </div>
    <div class="notes-area${d.notes?' open':''}" id="nw-${pid}-${game.id}">
      <textarea class="notes-ta" placeholder="Añadir nota…" onchange="doNote(${pid},'${game.id}',this.value)">${d.notes||''}</textarea>

```
</div>
```

  </div>`;
}

function refreshRow(pid, gid) {
const no = document.getElementById(`nw-${pid}-${gid}`)?.classList.contains(‘open’);
const bo = document.getElementById(`bs-${pid}-${gid}`)?.classList.contains(‘open’);
const row = document.getElementById(`gr-${pid}-${gid}`);
const game = GAMES.find(g => g.id === gid);
if (row && game) {
row.outerHTML = gameRowHTML(pid, game);
if (no) document.getElementById(`nw-${pid}-${gid}`)?.classList.add(‘open’);
if (bo) document.getElementById(`bs-${pid}-${gid}`)?.classList.add(‘open’);
}
}
function doTrack(pid, gid, field) {
if (!S.tracking[pid]) S.tracking[pid] = {};
if (!S.tracking[pid][gid]) S.tracking[pid][gid] = tDef();
S.tracking[pid][gid][field] = !S.tracking[pid][gid][field];
LS.save(); refreshRow(pid, gid); updateCard(pid); updateHeaderStats();
}
function doBall(pid, gid, ballId) {
if (!S.tracking[pid]) S.tracking[pid] = {};
if (!S.tracking[pid][gid]) S.tracking[pid][gid] = tDef();
S.tracking[pid][gid].ball = S.tracking[pid][gid].ball === ballId ? null : ballId;
LS.save(); refreshRow(pid, gid);
}
function doNote(pid, gid, value) {
if (!S.tracking[pid]) S.tracking[pid] = {};
if (!S.tracking[pid][gid]) S.tracking[pid][gid] = tDef();
S.tracking[pid][gid].notes = value;
LS.save(); updateCard(pid);
}

// ── INIT — runs synchronously, no DOMContentLoaded needed ──
(function init() {
LS.load(); LS.loadForms();
document.getElementById(‘sprite-btn’).classList.toggle(‘active’, !S.settings.modern);
// Populate stats game selector
const sel = document.getElementById(‘stats-game’);
GAMES.forEach(g => { const o = document.createElement(‘option’); o.value = g.id; o.textContent = g.name; sel.appendChild(o); });
// Wire up search input
document.getElementById(‘search-input’).addEventListener(‘input’, e => {
S.filters.q = e.target.value.trim();
document.getElementById(‘search-clear’).classList.toggle(‘show’, !!S.filters.q);
renderGrid();
});
renderFilters();
renderGrid();
})();
</script>
