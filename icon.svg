<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges">
  <!-- Love Ball pixel art — 24×24 grid -->
  <!-- Dark outline top arc -->
  <rect x="7"  y="0"  width="10" height="1" fill="#2e1c12"/>
  <rect x="4"  y="1"  width="4"  height="1" fill="#2e1c12"/>
  <rect x="16" y="1"  width="4"  height="1" fill="#2e1c12"/>
  <rect x="2"  y="2"  width="3"  height="1" fill="#2e1c12"/>
  <rect x="19" y="2"  width="3"  height="1" fill="#2e1c12"/>
  <rect x="1"  y="3"  width="2"  height="2" fill="#2e1c12"/>
  <rect x="21" y="3"  width="2"  height="2" fill="#2e1c12"/>
  <rect x="0"  y="5"  width="2"  height="5" fill="#2e1c12"/>
  <rect x="22" y="5"  width="2"  height="5" fill="#2e1c12"/>

  <!-- Pink upper half fill -->
  <rect x="4"  y="1"  width="4"  height="1" fill="#d44090"/>
  <rect x="10" y="1"  width="4"  height="1" fill="#d44090"/>
  <rect x="2"  y="2"  width="20" height="1" fill="#d44090"/>
  <rect x="1"  y="3"  width="22" height="1" fill="#d44090"/>

  <!-- Row 1 (y=1): pink interior -->
  <rect x="4"  y="1"  width="16" height="1" fill="#d44090"/>
  <!-- Row 2 -->
  <rect x="2"  y="2"  width="20" height="1" fill="#d44090"/>
  <!-- Row 3 -->
  <rect x="1"  y="3"  width="22" height="1" fill="#d44090"/>
  <!-- Row 4 -->
  <rect x="2"  y="4"  width="1"  height="1" fill="#2e1c12"/>
  <rect x="21" y="4"  width="1"  height="1" fill="#2e1c12"/>
  <rect x="3"  y="4"  width="18" height="1" fill="#d44090"/>

  <!-- Pink body rows 5–9 with highlights -->
  <rect x="2"  y="5"  width="1"  height="5" fill="#2e1c12"/>
  <rect x="21" y="5"  width="1"  height="5" fill="#2e1c12"/>

  <!-- Pink base rows -->
  <rect x="3"  y="5"  width="18" height="5" fill="#d44090"/>
  <!-- Lighter pink area (top-left highlight) -->
  <rect x="4"  y="2"  width="5"  height="2" fill="#f090c0"/>
  <rect x="4"  y="4"  width="3"  height="3" fill="#f090c0"/>
  <rect x="5"  y="3"  width="5"  height="2" fill="#f090c0"/>
  <!-- White highlight pixels -->
  <rect x="4"  y="3"  width="2"  height="1" fill="#ffe8f4"/>
  <rect x="5"  y="4"  width="2"  height="1" fill="#ffe8f4"/>
  <rect x="4"  y="5"  width="1"  height="1" fill="#fff0f8"/>

  <!-- Deeper pink on right -->
  <rect x="14" y="3"  width="7"  height="4" fill="#b8307a"/>
  <rect x="16" y="5"  width="5"  height="3" fill="#b8307a"/>

  <!-- Dark middle band row 10 -->
  <rect x="2"  y="10" width="20" height="1" fill="#2e1c12"/>
  <rect x="1"  y="10" width="1"  height="1" fill="#2e1c12"/>
  <rect x="22" y="10" width="1"  height="1" fill="#2e1c12"/>
  <rect x="0"  y="10" width="1"  height="1" fill="#2e1c12"/>
  <rect x="23" y="10" width="1"  height="1" fill="#2e1c12"/>

  <!-- Full band row 11 -->
  <rect x="0"  y="11" width="24" height="2" fill="#2e1c12"/>

  <!-- Beige lower half rows 13–22 -->
  <rect x="2"  y="13" width="1"  height="8" fill="#2e1c12"/>
  <rect x="21" y="13" width="1"  height="8" fill="#2e1c12"/>
  <rect x="3"  y="13" width="18" height="8" fill="#ccc0a0"/>

  <!-- Outline continues lower arc -->
  <rect x="1"  y="13" width="1"  height="6" fill="#2e1c12"/>
  <rect x="22" y="13" width="1"  height="6" fill="#2e1c12"/>
  <rect x="0"  y="13" width="1"  height="4" fill="#2e1c12"/>
  <rect x="23" y="13" width="1"  height="4" fill="#2e1c12"/>
  <rect x="1"  y="19" width="1"  height="1" fill="#2e1c12"/>
  <rect x="22" y="19" width="1"  height="1" fill="#2e1c12"/>
  <rect x="2"  y="20" width="1"  height="1" fill="#2e1c12"/>
  <rect x="21" y="20" width="1"  height="1" fill="#2e1c12"/>
  <rect x="3"  y="21" width="2"  height="1" fill="#2e1c12"/>
  <rect x="19" y="21" width="2"  height="1" fill="#2e1c12"/>
  <rect x="5"  y="22" width="4"  height="1" fill="#2e1c12"/>
  <rect x="15" y="22" width="4"  height="1" fill="#2e1c12"/>
  <rect x="9"  y="23" width="6"  height="1" fill="#2e1c12"/>

  <!-- Beige lower continuations closing arc -->
  <rect x="3"  y="20" width="18" height="1" fill="#ccc0a0"/>
  <rect x="4"  y="21" width="16" height="1" fill="#ccc0a0"/>
  <rect x="5"  y="22" width="14" height="1" fill="#ccc0a0"/>
  <rect x="9"  y="23" width="6"  height="1" fill="#ccc0a0"/>

  <!-- Button circle in lower area (slightly left of center) -->
  <rect x="5"  y="14" width="7"  height="1" fill="#b0a488"/>
  <rect x="4"  y="15" width="9"  height="5" fill="#b0a488"/>
  <rect x="5"  y="20" width="7"  height="1" fill="#b0a488"/>
  <!-- Inner button lighter -->
  <rect x="5"  y="15" width="7"  height="5" fill="#c4b898"/>
  <!-- White cross on button -->
  <rect x="6"  y="17" width="5"  height="1" fill="#e8e4d4"/>
  <rect x="8"  y="15" width="1"  height="5" fill="#e8e4d4"/>
  <!-- Cross center bright white -->
  <rect x="8"  y="17" width="1"  height="1" fill="#ffffff"/>
</svg>
